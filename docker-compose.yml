# docker-compose.yml
services:
  db:
    image: postgres:17-alpine
    container_name: bicycle_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: web_bike
    ports:
      - "5432:5432"
    volumes:
      - bicycle_pg_data:/var/lib/postgresql/data
      - ./backend/app/db/sql:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: bicycle_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:123@db:5432/web_bike
    volumes:
      - ./backend:/app
      - ./backend/static/images:/app/static/images
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: bicycle_frontend
    restart: always
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  bicycle_pg_data:
